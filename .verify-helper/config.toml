[languages.cpp]
# test は全ファイル special comments 済みで未使用。lib ヘッダ側の
# 無駄な `g++ -dM -E` 呼び出し（oj-resolve の主要コスト）を避ける。
read_macros = false

[[languages.cpp.environments]]
CXX = "g++"
CXXFLAGS = [
    "-O2",
    "-Wall",
    "-Wextra",
    "-fconstexpr-depth=1024",
    "-fconstexpr-loop-limit=524288",
    "-fconstexpr-ops-limit=2097152",
    "-march=native",
    "-pthread",
    "-std=gnu++23",
    "-I./lib",
]
