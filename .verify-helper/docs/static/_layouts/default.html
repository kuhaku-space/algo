<!doctype html>
<html lang="{{ site.lang | default: "ja" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <meta name="theme-color" content="#157878">
    <title>
      {% if page.title %}{{ page.title | escape }} · {% endif %}{{ site.title | escape }}
    </title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ "/" | relative_url }}">{{ site.title | escape }}</a></h1>
        {% if site.description %}
        <p>{{ site.description | escape }}</p>
        {% endif %}
        <p class="view">
          <a href="{{ site.repository_url }}">GitHubでリポジトリを見る</a>
        </p>
      </header>
      <section>
        {{ content }}
      </section>
      <footer>
        <p>
          <small>Hosted on GitHub Pages</small>
        </p>
      </footer>
    </div>
  </body>
</html>
